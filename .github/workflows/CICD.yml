name: CI/CD — Azure VM Deploy

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite, zip, redis

      - run: composer install --no-interaction --no-progress
      - run: ./vendor/bin/pest

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend assets
        run: npm run build

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push app & queue
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            joseph0070/threadfor-api:app-latest
            joseph0070/threadfor-api:queue-latest
            joseph0070/threadfor-api:${{ github.sha }}

      - name: Build and push nginx
        uses: docker/build-push-action@v6
        with:
          context: docker/nginx
          push: true
          tags: joseph0070/threadfor-api:nginx-latest

  terraform:
    needs: [test, build-and-push]
    runs-on: ubuntu-latest
    outputs:
      vm_ip: ${{ steps.vmip.outputs.ip }}
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5.7'

      - name: Write SSH public key
        run: echo "${{ secrets.SSH_PUBLIC_KEY }}" > terraform/id_ed25519.pub

      - working-directory: terraform
        run: terraform init

      - working-directory: terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          RG: threadforge-rgaz
          SUB: ${{ secrets.ARM_SUBSCRIPTION_ID }}
        run: |
          VARS="-var groq_api_key=${{ secrets.GROQ_API_KEY }} -var ssh_public_key_path=./id_ed25519.pub"
          terraform import $VARS azurerm_resource_group.rg /subscriptions/$SUB/resourceGroups/$RG || true
          terraform import $VARS azurerm_public_ip.public_ip /subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Network/publicIPAddresses/threadforge-vm-ip || true
          terraform import $VARS azurerm_network_security_group.nsg /subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Network/networkSecurityGroups/threadforge-nsg || true
          terraform import $VARS azurerm_virtual_network.vnet /subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Network/virtualNetworks/threadforge-vnet || true
          terraform import $VARS azurerm_subnet.subnet /subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Network/virtualNetworks/threadforge-vnet/subnets/threadforge-subnet || true
          terraform import $VARS azurerm_network_interface.nic /subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Network/networkInterfaces/threadforge-nic || true
          NIC_ID="/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Network/networkInterfaces/threadforge-nic"
          NSG_ID="/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Network/networkSecurityGroups/threadforge-nsg"
          terraform import $VARS azurerm_network_interface_security_group_association.nsg_assoc "${NIC_ID}|${NSG_ID}" || true
          terraform import $VARS azurerm_linux_virtual_machine.vm /subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Compute/virtualMachines/threadforge-vm || true

      - working-directory: terraform
        run: terraform validate

      - working-directory: terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        run: |
          terraform apply -auto-approve \
            -var "ssh_public_key_path=./id_ed25519.pub" \
            -var "groq_api_key=${{ secrets.GROQ_API_KEY }}"

      - id: vmip
        working-directory: terraform
        run: echo "ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

  deploy:
    needs: [terraform, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for SSH to become available
        run: |
          host=${{ needs.terraform.outputs.vm_ip }}
          for i in $(seq 1 30); do
            if bash -c "</dev/tcp/$host/22" >/dev/null 2>&1; then
              echo "SSH ready on $host:22"
              exit 0
            fi
            echo "Waiting for SSH on $host:22 (attempt $i/30)..."
            sleep 10
          done
          echo "SSH did not become available on $host:22"
          exit 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ needs.terraform.outputs.vm_ip }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            command -v docker >/dev/null 2>&1 || {
              while sudo fuser /var/lib/apt/lists/lock >/dev/null 2>&1; do sleep 2; done
              curl -fsSL https://get.docker.com | sudo sh
              sudo usermod -aG docker azureuser
            }
            [ -d /opt/threadforge ] || {
              sudo mkdir -p /opt/threadforge
              sudo git clone https://github.com/Pro-joseph/ThreadForge_API.git /opt/threadforge
            }
            cd /opt/threadforge
            sudo docker compose -f docker-compose.prod.yml pull
            sudo GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" sudo docker compose -f docker-compose.prod.yml up -d
      - name: Debug — check running containers
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ needs.terraform.outputs.vm_ip }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo docker ps -a
            sudo docker compose -f /opt/threadforge/docker-compose.prod.yml logs --tail=50      
      - name: Full diagnostic
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ needs.terraform.outputs.vm_ip }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "--- ufw ---"
            sudo ufw status verbose 2>&1 || echo "ufw not available"
            echo "--- listening ports ---"
            sudo ss -tlnp
            echo "--- curl localhost ---"
            curl -sv http://localhost:80 2>&1 | head -30
            echo "--- iptables ---"
            sudo iptables -L -n | head -30      