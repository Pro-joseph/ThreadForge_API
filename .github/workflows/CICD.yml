name: CI/CD Terraform -> Azure VM -> Deploy

on:
  push:
    branches: ["master"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite, zip
      - run: composer install --no-interaction --no-progress
      - run: ./vendor/bin/pest 

  terraform:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      vm_ip: ${{ steps.vmip.outputs.ip }}
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.5.7'
      - run: echo "${{ secrets.SSH_PUBLIC_KEY }}" > ./id_ed25519.pub
      - working-directory: terraform
        run: terraform init
      - working-directory: terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        run: terraform apply -auto-approve -var "ssh_public_key_path=../id_ed25519.pub"
      - id: vmip
        working-directory: terraform
        run: echo "ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

  build:
    needs: terraform
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/threadforge
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: [terraform, build]
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/threadforge
    steps:
      - name: Generate .env.production
        run: |
          echo "APP_DEBUG=false" >> .env.production
          echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env.production
          echo "DB_CONNECTION=mysql" >> .env.production
          echo "DB_HOST=mysql" >> .env.production
          echo "DB_PORT=3306" >> .env.production
          echo "DB_DATABASE=threadforge" >> .env.production
          echo "DB_USERNAME=root" >> .env.production
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env.production

      - name: Send .env to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ needs.terraform.outputs.vm_ip }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".env.production"
          target: "/home/azureuser/.env"

      - name: Deploy on VM (SSH, pull & run)
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ needs.terraform.outputs.vm_ip }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}

            docker network create app-net || true

            docker run -d --name mysql \
              --network app-net \
              -e MYSQL_ROOT_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e MYSQL_DATABASE=threadforge \
              -v mysql_data:/var/lib/mysql \
              --restart unless-stopped \
              mysql:8.0 || true

            docker stop threadforge || true
            docker rm threadforge || true
            docker run -d --restart unless-stopped -p 80:80 \
              --network app-net \
              --env-file /home/azureuser/.env \
              --name threadforge ${{ env.IMAGE_NAME }}:${{ github.sha }}