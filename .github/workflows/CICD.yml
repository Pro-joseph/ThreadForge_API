name: CI/CD — Azure VM Deploy

on:
  push:
    branches: ["master"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_sqlite, zip, redis

      - run: composer install --no-interaction --no-progress
      - run: ./vendor/bin/pest

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push images
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            joseph0070/threadfor-api:app-latest
            joseph0070/threadfor-api:queue-latest
            joseph0070/threadfor-api:${{ github.sha }}

  terraform:
    needs: [test, build-and-push]
    runs-on: ubuntu-latest
    outputs:
      vm_ip: ${{ steps.vmip.outputs.ip }}
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5.7'

      - name: Write SSH public key
        run: echo "${{ secrets.SSH_PUBLIC_KEY }}" > terraform/id_ed25519.pub

      - working-directory: terraform
        run: terraform init

      - working-directory: terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        run: terraform import \
              -var "groq_api_key=${{ secrets.GROQ_API_KEY }}" \
              -var "ssh_public_key_path=./id_ed25519.pub" \
              azurerm_resource_group.rg /subscriptions/${{ secrets.ARM_SUBSCRIPTION_ID }}/resourceGroups/threadforge-rga || true

      - working-directory: terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        run: |
          terraform apply -auto-approve \
            -var "ssh_public_key_path=./id_ed25519.pub" \
            -var "groq_api_key=${{ secrets.GROQ_API_KEY }}"

      - id: vmip
        working-directory: terraform
        run: echo "ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

  deploy:
    needs: [terraform, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ needs.terraform.outputs.vm_ip }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/threadforge
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d