services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: threadforge_app
    restart: unless-stopped
    volumes:
      - .:/var/www
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      - mysql
      - redis
    networks:
      - threadforge

  nginx:
    image: nginx:stable-alpine
    container_name: threadforge_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - threadforge

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: threadforge_queue
    restart: unless-stopped
    command: php artisan queue:work redis --queue=default --tries=3 --sleep=2
    volumes:
      - .:/var/www
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      - mysql
      - redis
      - app
    networks:
      - threadforge

  mysql:
    image: mysql:8.4
    container_name: threadforge_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: threadforge
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: threadforge
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - threadforge

  redis:
    image: redis:alpine
    container_name: threadforge_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - threadforge

networks:
  threadforge:
    driver: bridge

volumes:
  mysql_data: